<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Comparison</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f2f2f2; color: #333; }

    /* ---- Header ---- */
    header {
      position: sticky; top: 0; z-index: 10;
      background: #2b2b2b; color: white;
      padding: 0.75rem 1.25rem;
      display: flex; align-items: center; gap: 1rem;
    }
    header h1 { margin: 0; font-size: 1.1rem; white-space: nowrap; }
    #stats { font-size: 0.8rem; opacity: 0.65; }
    .global-btns { margin-left: auto; display: flex; gap: 0.4rem; }
    .global-btn {
      padding: 0.3rem 0.65rem; border-radius: 4px; cursor: pointer; font-size: 0.78rem;
      border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white;
    }
    .global-btn:hover { background: rgba(255,255,255,0.22); }

    /* ---- Cards ---- */
    main { padding: 1rem; max-width: 1600px; margin: 0 auto; }
    .card {
      background: white; border-radius: 6px; margin-bottom: 0.9rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12); overflow: hidden;
    }
    .card-header {
      padding: 0.6rem 1rem; border-bottom: 1px solid #eee;
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .card-title { font-family: monospace; font-size: 0.875rem; flex: 1; }
    .badge {
      padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.7rem; font-weight: 700;
    }
    .badge-new     { background: #d1fae5; color: #065f46; }
    .badge-changed { background: #fef3c7; color: #92400e; }
    .toggle-group  { display: flex; gap: 0; border: 1px solid #d1d5db; border-radius: 4px; overflow: hidden; }
    .toggle-btn {
      padding: 0.2rem 0.55rem; background: white; color: #555; cursor: pointer;
      border: none; font-size: 0.73rem; border-right: 1px solid #d1d5db;
    }
    .toggle-btn:last-child { border-right: none; }
    .toggle-btn.active { background: #2b2b2b; color: white; }
    .toggle-btn:hover:not(.active) { background: #f3f4f6; }

    /* ---- Card body ---- */
    .card-body { padding: 0.75rem; }

    /* Side by side */
    .side-by-side { display: flex; gap: 0.75rem; }
    .panel { flex: 1; min-width: 0; }
    .panel > label {
      display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #888; margin-bottom: 0.3rem;
    }
    .panel img { width: 100%; height: auto; border: 1px solid #e5e7eb; display: block; border-radius: 2px; }

    /* Onion skin */
    .onion-skin { }
    .onion-stack { position: relative; display: inline-block; width: 100%; border: 1px solid #e5e7eb; border-radius: 2px; overflow: hidden; }
    .onion-stack > img { width: 100%; height: auto; display: block; }
    .onion-stack > .img-new { position: absolute; top: 0; left: 0; width: 100%; }
    .slider-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 0 0; font-size: 0.72rem; color: #888;
    }
    .slider-row input[type="range"] { flex: 1; accent-color: #2b2b2b; }

    /* No-old case: single image */
    .single-img img { width: 100%; height: auto; border: 1px solid #e5e7eb; border-radius: 2px; }

    /* Empty state */
    .empty { padding: 2rem; text-align: center; color: #888; }
    .empty code { background: #f3f4f6; padding: 0.2rem 0.4rem; border-radius: 3px; font-size: 0.85rem; }
  </style>
</head>
<body>

<!-- screenshots-data.js sets window.SCREENSHOTS — generated by compare_screenshots.py -->
<script src="screenshots/screenshots-data.js"></script>

<header>
  <h1>Screenshot Comparison</h1>
  <span id="stats"></span>
  <div class="global-btns">
    <button class="global-btn" onclick="setAllMode('side')">All side-by-side</button>
    <button class="global-btn" onclick="setAllMode('onion')">All onion-skin</button>
  </div>
</header>

<main id="main"></main>

<script>
  const screenshots = window.SCREENSHOTS || [];

  // ---- Stats ----
  const newCount     = screenshots.filter(s => !s.hasOld).length;
  const changedCount = screenshots.filter(s =>  s.hasOld).length;
  document.getElementById('stats').textContent =
    `${screenshots.length} page(s)  ·  ${newCount} new  ·  ${changedCount} changed`;

  // ---- Card rendering ----
  function buildCard(entry) {
    const { name, slug, hasOld } = entry;
    const card = document.createElement('div');
    card.className = 'card';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'card-header';
    hdr.innerHTML = `<span class="card-title">${name}</span>
      <span class="badge ${hasOld ? 'badge-changed' : 'badge-new'}">${hasOld ? 'CHANGED' : 'NEW'}</span>`;

    if (hasOld) {
      const grp = document.createElement('div');
      grp.className = 'toggle-group';
      grp.innerHTML = `
        <button class="toggle-btn"        id="btn-side-${slug}"
                onclick="setMode('${slug}', 'side')">Side by side</button>
        <button class="toggle-btn active" id="btn-onion-${slug}"
                onclick="setMode('${slug}', 'onion')">Onion skin</button>`;
      hdr.appendChild(grp);
    }
    card.appendChild(hdr);

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    if (!hasOld) {
      // New page — just show the screenshot
      body.innerHTML = `<div class="single-img"><img src="screenshots/${slug}.png" alt="${name}"></div>`;
    } else {
      // Changed page — side-by-side + onion-skin (togglable)
      body.innerHTML = `
        <div id="view-side-${slug}" class="side-by-side" style="display:none">
          <div class="panel"><label>Old</label><img src="screenshots/old/${slug}.png" alt="old ${name}"></div>
          <div class="panel"><label>New</label><img src="screenshots/${slug}.png"     alt="new ${name}"></div>
        </div>
        <div id="view-onion-${slug}" class="onion-skin">
          <div class="onion-stack" id="onion-stack-${slug}">
            <img src="screenshots/old/${slug}.png" alt="old ${name}" id="onion-old-${slug}">
            <img src="screenshots/${slug}.png" alt="new ${name}" class="img-new" id="onion-img-${slug}" style="opacity:0.5">
          </div>
          <div class="slider-row">
            <span>Old</span>
            <input type="range" min="0" max="1" step="0.01" value="0.5"
                   id="onion-slider-${slug}" oninput="updateOnion('${slug}', this.value)">
            <span>New</span>
          </div>
        </div>`;
    }

    card.appendChild(body);
    return card;
  }

  // ---- Onion-skin: interpolate container height so taller image doesn't bleed through ----
  function updateOnion(slug, value) {
    const opacity = parseFloat(value);
    const newImg  = document.getElementById('onion-img-' + slug);
    const oldImg  = document.getElementById('onion-old-' + slug);
    const stack   = document.getElementById('onion-stack-' + slug);
    newImg.style.opacity = opacity;

    // Compute each image's rendered height from its natural aspect ratio
    const w      = stack.clientWidth;
    const oldH   = oldImg.naturalWidth  ? w * oldImg.naturalHeight  / oldImg.naturalWidth  : 0;
    const newH   = newImg.naturalWidth  ? w * newImg.naturalHeight  / newImg.naturalWidth  : 0;
    if (oldH && newH) {
      stack.style.height = (newH * opacity + oldH * (1 - opacity)) + 'px';
    }
  }

  // Initialise heights for all onion stacks once images have loaded
  window.addEventListener('load', () => {
    screenshots.filter(s => s.hasOld).forEach(s => updateOnion(s.slug, 0.5));
  });

  // Recalculate heights on resize (debounced)
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      screenshots.filter(s => s.hasOld).forEach(s => {
        const slider = document.getElementById('onion-slider-' + s.slug);
        if (slider) updateOnion(s.slug, slider.value);
      });
    }, 50);
  });

  // ---- Mode toggle ----
  function setMode(slug, mode) {
    document.getElementById(`view-side-${slug}`).style.display  = mode === 'side'  ? '' : 'none';
    document.getElementById(`view-onion-${slug}`).style.display = mode === 'onion' ? '' : 'none';
    document.getElementById(`btn-side-${slug}`).classList.toggle('active',  mode === 'side');
    document.getElementById(`btn-onion-${slug}`).classList.toggle('active', mode === 'onion');
  }

  function setAllMode(mode) {
    screenshots.filter(s => s.hasOld).forEach(s => setMode(s.slug, mode));
  }

  // ---- Render ----
  const main = document.getElementById('main');
  if (screenshots.length === 0) {
    main.innerHTML = `<div class="empty">
      <p>No screenshot data found.</p>
      <p>Run <code>python tests/compare_screenshots.py</code> to generate screenshots,<br>
         then reload this page.</p>
    </div>`;
  } else {
    screenshots.forEach(entry => main.appendChild(buildCard(entry)));
  }
</script>

</body>
</html>
